<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Dispensa — Inventario & Ventas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --terracota: #C1522A;
    --marron: #2C1A0E;
    --crema: #F5F0E8;
    --oliva: #4A5C2F;
    --dorado: #B8962E;
    --blanco: #FFFFFF;
    --gris-suave: #EDE8DF;
    --gris-texto: #6B6159;
    --alerta: #D97706;
    --verde: #3B6D11;
    --rojo: #991B1B;
    --azul: #1E4D8C;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--crema); color: var(--marron); min-height: 100vh; }

  /* HEADER */
  .header { background: var(--marron); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-logo { display: flex; align-items: center; gap: 10px; }
  .header-logo svg { width: 32px; height: 32px; }
  .header-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--crema); letter-spacing: 0.02em; }
  .header-sub { font-size: 10px; color: var(--dorado); letter-spacing: 0.12em; text-transform: uppercase; }
  .header-time { font-size: 12px; color: #a09080; text-align: right; line-height: 1.5; }

  /* NAV */
  .nav { background: var(--marron); border-top: 1px solid rgba(255,255,255,0.08); display: flex; overflow-x: auto; scrollbar-width: none; }
  .nav::-webkit-scrollbar { display: none; }
  .nav-btn { flex-shrink: 0; padding: 11px 18px; font-size: 12px; font-weight: 500; color: #a09080; background: none; border: none; cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
  .nav-btn.active { color: var(--dorado); border-bottom-color: var(--dorado); }

  /* MAIN */
  .main { padding: 16px; max-width: 600px; margin: 0 auto; }
  .screen { display: none; }
  .screen.active { display: block; }

  /* METRIC CARDS */
  .metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
  .metric { background: var(--blanco); border-radius: 12px; padding: 14px 16px; border: 1px solid rgba(0,0,0,0.06); }
  .metric-label { font-size: 11px; color: var(--gris-texto); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .metric-value { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 600; color: var(--marron); }
  .metric-value.green { color: var(--verde); }
  .metric-value.amber { color: var(--alerta); }
  .metric-value.blue { color: var(--azul); }
  .metric-value.red { color: var(--rojo); }

  /* CARDS */
  .card { background: var(--blanco); border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.06); }
  .card-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: var(--marron); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--gris-suave); }

  /* ALERTS */
  .alert-item { display: flex; align-items: center; gap: 10px; background: #FEF3C7; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; font-size: 13px; color: #78350F; }
  .alert-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--alerta); flex-shrink: 0; }
  .alert-item.rojo { background: #FEE2E2; color: var(--rojo); }
  .alert-item.rojo .alert-dot { background: var(--rojo); }

  /* PRODUCT ROWS */
  .prod-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--gris-suave); }
  .prod-row:last-child { border-bottom: none; padding-bottom: 0; }
  .prod-cat { font-size: 10px; padding: 2px 7px; border-radius: 20px; flex-shrink: 0; font-weight: 500; letter-spacing: 0.04em; }
  .cat-cafe { background: #FEF3C7; color: #78350F; }
  .cat-dulce { background: #FCE7F3; color: #831843; }
  .cat-pasta { background: #DCFCE7; color: #14532D; }
  .cat-puglia { background: #D1FAE5; color: #064E3B; }
  .cat-combo { background: #E0E7FF; color: #1E1B4B; }
  .prod-name { flex: 1; font-size: 13px; color: var(--marron); line-height: 1.3; }
  .prod-price { font-size: 12px; color: var(--gris-texto); min-width: 36px; text-align: right; }
  .prod-stock { font-size: 14px; font-weight: 600; min-width: 28px; text-align: center; }
  .s-ok { color: var(--verde); }
  .s-low { color: var(--alerta); }
  .s-out { color: var(--rojo); }
  .badge-out { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: #FEE2E2; color: var(--rojo); font-weight: 500; }

  /* SELL BUTTON */
  .btn-vender { font-size: 12px; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--terracota); background: transparent; color: var(--terracota); cursor: pointer; font-weight: 500; transition: all 0.15s; white-space: nowrap; }
  .btn-vender:hover { background: var(--terracota); color: white; }
  .btn-vender:disabled { border-color: #ccc; color: #ccc; cursor: not-allowed; }

  /* SALE ROWS */
  .sale-row { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px solid var(--gris-suave); font-size: 13px; }
  .sale-row:last-child { border-bottom: none; }
  .sale-time { color: var(--gris-texto); font-size: 11px; min-width: 44px; }
  .sale-prod { flex: 1; color: var(--marron); }
  .sale-metodo { font-size: 10px; padding: 2px 6px; border-radius: 20px; background: var(--gris-suave); color: var(--gris-texto); white-space: nowrap; }
  .sale-amount { font-weight: 600; color: var(--verde); min-width: 48px; text-align: right; font-family: 'Playfair Display', serif; }

  /* FORMS */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 11px; color: var(--gris-texto); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; display: block; }
  select, input[type=number], input[type=text] {
    width: 100%; padding: 10px 12px; font-size: 14px;
    border: 1px solid rgba(0,0,0,0.15); border-radius: 8px;
    background: var(--crema); color: var(--marron);
    font-family: 'Inter', sans-serif; outline: none;
    transition: border-color 0.2s;
  }
  select:focus, input:focus { border-color: var(--terracota); }

  .preview-box { background: var(--crema); border-radius: 10px; padding: 14px; margin-bottom: 14px; border: 1px solid rgba(0,0,0,0.08); }
  .preview-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--gris-texto); margin-bottom: 6px; }
  .preview-total { display: flex; justify-content: space-between; font-size: 17px; font-weight: 600; color: var(--marron); font-family: 'Playfair Display', serif; }
  .preview-total span:last-child { color: var(--verde); }

  .btn-primary { width: 100%; padding: 13px; background: var(--terracota); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; letter-spacing: 0.03em; transition: background 0.2s; }
  .btn-primary:hover { background: #a84422; }

  .btn-secondary { width: 100%; padding: 13px; background: var(--oliva); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.2s; }
  .btn-secondary:hover { background: #374521; }

  /* CONFIRM */
  .confirm-card { background: #F0FDF4; border: 1px solid #86EFAC; border-radius: 14px; padding: 20px; text-align: center; margin-bottom: 12px; }
  .confirm-icon { width: 40px; height: 40px; border-radius: 50%; background: #DCFCE7; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
  .confirm-title { font-family: 'Playfair Display', serif; font-size: 16px; color: #14532D; margin-bottom: 4px; }
  .confirm-desc { font-size: 13px; color: #166534; }

  /* BAR CHART */
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-name { font-size: 12px; color: var(--gris-texto); width: 120px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 7px; background: var(--gris-suave); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; background: var(--terracota); transition: width 0.6s ease; }
  .bar-fill.oliva { background: var(--oliva); }
  .bar-val { font-size: 12px; font-weight: 600; color: var(--marron); min-width: 40px; text-align: right; font-family: 'Playfair Display', serif; }

  /* SECTION LABEL */
  .section-label { font-size: 11px; color: var(--gris-texto); text-transform: uppercase; letter-spacing: 0.08em; margin: 16px 0 8px; }

  /* EMPTY */
  .empty { text-align: center; padding: 28px; color: var(--gris-texto); font-size: 13px; }

  /* DIVIDER */
  .divider { height: 1px; background: var(--gris-suave); margin: 12px 0; }

  /* TOAST */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--marron); color: var(--crema); padding: 12px 24px; border-radius: 50px; font-size: 13px; font-weight: 500; z-index: 9999; transition: transform 0.3s ease; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="16,2 30,28 2,28" stroke="#B8962E" stroke-width="1.8" fill="none"/>
      <circle cx="16" cy="4" r="1.8" fill="#B8962E"/>
      <path d="M12 22 Q14 16 16 14 Q18 16 20 22" stroke="#B8962E" stroke-width="1.5" fill="none"/>
      <path d="M10 24 Q13 20 16 19 Q19 20 22 24" stroke="#B8962E" stroke-width="1.2" fill="none" opacity="0.7"/>
    </svg>
    <div>
      <div class="header-title">La Dispensa</div>
      <div class="header-sub">De Puglia a Valencia</div>
    </div>
  </div>
  <div class="header-time" id="header-time"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="nav-btn active" onclick="nav('dashboard',this)">Resumen</button>
  <button class="nav-btn" onclick="nav('vender',this)">Vender</button>
  <button class="nav-btn" onclick="nav('inventario',this)">Inventario</button>
  <button class="nav-btn" onclick="nav('historial',this)">Historial</button>
  <button class="nav-btn" onclick="nav('reportes',this)">Reportes</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- DASHBOARD -->
  <div class="screen active" id="screen-dashboard">
    <div class="metrics" id="m-dashboard"></div>
    <div id="alertas"></div>
    <div class="card">
      <div class="card-title">Últimas ventas</div>
      <div id="ultimas"></div>
    </div>
  </div>

  <!-- VENDER -->
  <div class="screen" id="screen-vender">
    <div class="card">
      <div class="card-title">Registrar venta</div>
      <div class="form-group">
        <label class="form-label">Producto</label>
        <select id="v-prod" onchange="calcPreview()"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Cantidad</label>
        <input type="number" id="v-qty" value="1" min="1" max="99" oninput="calcPreview()" style="max-width:90px;">
      </div>
      <div class="form-group">
        <label class="form-label">Método de pago</label>
        <select id="v-pago">
          <option>Efectivo $</option>
          <option>Zelle</option>
          <option>Pago móvil</option>
        </select>
      </div>
      <div class="preview-box">
        <div class="preview-row"><span>Precio unitario</span><span id="prev-precio">$0</span></div>
        <div class="preview-row"><span>Cantidad</span><span id="prev-qty">1</span></div>
        <div class="divider"></div>
        <div class="preview-total"><span>Total</span><span id="prev-total">$0</span></div>
      </div>
      <button class="btn-primary" onclick="registrarVenta()">Confirmar venta</button>
    </div>
    <div id="venta-ok" style="display:none;" class="confirm-card">
      <div class="confirm-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 10l4 4 8-8" stroke="#16A34A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="confirm-title">Venta registrada</div>
      <div class="confirm-desc" id="venta-ok-desc"></div>
    </div>
  </div>

  <!-- INVENTARIO -->
  <div class="screen" id="screen-inventario">
    <div class="card">
      <div class="card-title">Stock actual</div>
      <div id="lista-inv"></div>
    </div>
    <div class="card">
      <div class="card-title">Reponer stock</div>
      <div class="form-group">
        <label class="form-label">Producto</label>
        <select id="r-prod"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Unidades a agregar</label>
        <input type="number" id="r-qty" value="10" min="1" style="max-width:90px;">
      </div>
      <button class="btn-secondary" onclick="reponer()">Agregar al inventario</button>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div class="screen" id="screen-historial">
    <div class="metrics" id="m-historial"></div>
    <div class="card">
      <div class="card-title">Ventas registradas hoy</div>
      <div id="lista-historial"></div>
    </div>
  </div>

  <!-- REPORTES -->
  <div class="screen" id="screen-reportes">
    <div class="metrics" id="m-reportes"></div>
    <div class="card">
      <div class="card-title">Productos más vendidos</div>
      <div id="top-prods"></div>
    </div>
    <div class="card">
      <div class="card-title">Por método de pago</div>
      <div id="por-pago"></div>
    </div>
    <div class="card">
      <div class="card-title">Por categoría</div>
      <div id="por-cat"></div>
    </div>
    <button class="btn-primary" onclick="exportarCSV()" style="margin-top:4px;">Exportar ventas a CSV</button>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────
const PRODS = [
  {id:1, n:'Lavazza Rossa 250g',       cat:'cafe',   p:18,  s:20, a:5},
  {id:2, n:'Lavazza Oro 250g',         cat:'cafe',   p:22,  s:15, a:4},
  {id:3, n:'Moka Bialetti 3 tazas',    cat:'cafe',   p:65,  s:6,  a:2},
  {id:4, n:'Moka Bialetti 6 tazas',    cat:'cafe',   p:90,  s:4,  a:2},
  {id:5, n:'Kimbo Espresso 250g',      cat:'cafe',   p:15,  s:12, a:4},
  {id:6, n:'Nutella 750g',             cat:'dulce',  p:16,  s:10, a:3},
  {id:7, n:'Ferrero Rocher x16',       cat:'dulce',  p:19,  s:10, a:3},
  {id:8, n:'Raffaello x15',            cat:'dulce',  p:18,  s:8,  a:3},
  {id:9, n:'Cantucci 200g',            cat:'dulce',  p:12,  s:12, a:4},
  {id:10,n:'Amaretti 200g',            cat:'dulce',  p:11,  s:12, a:4},
  {id:11,n:'Kinder Bueno caja',        cat:'dulce',  p:15,  s:8,  a:3},
  {id:12,n:'Pasta De Cecco 500g',      cat:'pasta',  p:7,   s:25, a:8},
  {id:13,n:'Pasta Garofalo 500g',      cat:'pasta',  p:8,   s:20, a:7},
  {id:14,n:'Mutti Passata 700ml',      cat:'pasta',  p:9,   s:20, a:6},
  {id:15,n:'Pesto Barilla verde',      cat:'pasta',  p:8,   s:18, a:6},
  {id:16,n:'Pesto rosso',              cat:'pasta',  p:8,   s:10, a:5},
  {id:17,n:'Orecchiette artesanales',  cat:'puglia', p:11,  s:15, a:4},
  {id:18,n:'Taralli baresani 300g',    cat:'puglia', p:9,   s:20, a:5},
  {id:19,n:'Aceite oliva Puglia 500ml',cat:'puglia', p:18,  s:8,  a:3},
  {id:20,n:'Conservas alcachofas',     cat:'puglia', p:12,  s:10, a:3},
  {id:21,n:'Kit Espresso (combo)',     cat:'combo',  p:105, s:4,  a:1},
  {id:22,n:'Cesta Dolce Italia (combo)',cat:'combo', p:58,  s:4,  a:1},
  {id:23,n:'Kit Cena Italiana (combo)',cat:'combo',  p:45,  s:5,  a:1},
  {id:24,n:'Combo Entrada',            cat:'combo',  p:34,  s:6,  a:2},
];

const CAT_LABEL = {cafe:'café', dulce:'dulces', pasta:'pasta', puglia:'puglia', combo:'combo'};
const CAT_CLASS = {cafe:'cat-cafe', dulce:'cat-dulce', pasta:'cat-pasta', puglia:'cat-puglia', combo:'cat-combo'};

// Load from localStorage or use demo data
let ventas = JSON.parse(localStorage.getItem('ld_ventas') || '[]');
let productos = JSON.parse(localStorage.getItem('ld_productos') || JSON.stringify(PRODS));

// Restore fresh stock if empty (first load)
if (!localStorage.getItem('ld_productos')) saveData();

function saveData() {
  localStorage.setItem('ld_ventas', JSON.stringify(ventas));
  localStorage.setItem('ld_productos', JSON.stringify(productos));
}

// ── NAVIGATION ────────────────────────────────────────────────────
function nav(name, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  btn.classList.add('active');
  render(name);
}

function render(name) {
  if (name==='dashboard')  renderDashboard();
  if (name==='vender')     renderVender();
  if (name==='inventario') renderInventario();
  if (name==='historial')  renderHistorial();
  if (name==='reportes')   renderReportes();
}

// ── HELPERS ───────────────────────────────────────────────────────
function sClass(prod) {
  if (prod.s === 0) return 's-out';
  if (prod.s <= prod.a) return 's-low';
  return 's-ok';
}

function prodOpts(includeOutOfStock) {
  return productos.map(p =>
    `<option value="${p.id}" ${(!includeOutOfStock && p.s===0)?'disabled':''}>
      ${p.n} — $${p.p} ${p.s===0?'(agotado)':'(stock: '+p.s+')'}
    </option>`
  ).join('');
}

function today() {
  return new Date().toLocaleDateString('es-VE');
}

function ventasHoy() {
  return ventas.filter(v => v.fecha === today());
}

function nowTime() {
  const n = new Date();
  return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── DASHBOARD ─────────────────────────────────────────────────────
function renderDashboard() {
  const vh = ventasHoy();
  const totalHoy = vh.reduce((a,v)=>a+v.total,0);
  const alertas = productos.filter(p=>p.s<=p.a).length;
  const sinStock = productos.filter(p=>p.s===0).length;

  document.getElementById('m-dashboard').innerHTML = `
    <div class="metric"><div class="metric-label">Ingresos hoy</div><div class="metric-value green">$${totalHoy}</div></div>
    <div class="metric"><div class="metric-label">Ventas hoy</div><div class="metric-value blue">${vh.length}</div></div>
    <div class="metric"><div class="metric-label">Total acumulado</div><div class="metric-value green">$${ventas.reduce((a,v)=>a+v.total,0)}</div></div>
    <div class="metric"><div class="metric-label">Alertas stock</div><div class="metric-value ${alertas>0?'red':''}">${alertas}</div></div>
  `;

  let al = '';
  productos.filter(p=>p.s===0).forEach(p=>{
    al += `<div class="alert-item rojo"><div class="alert-dot"></div><b>${p.n}</b> — sin stock</div>`;
  });
  productos.filter(p=>p.s>0&&p.s<=p.a).forEach(p=>{
    al += `<div class="alert-item"><div class="alert-dot"></div><b>${p.n}</b> — solo ${p.s} unidades</div>`;
  });
  document.getElementById('alertas').innerHTML = al;

  const ult = [...ventasHoy()].reverse().slice(0,5);
  document.getElementById('ultimas').innerHTML = ult.length
    ? ult.map(v=>`
      <div class="sale-row">
        <span class="sale-time">${v.hora}</span>
        <span class="sale-prod">${v.nombre} ×${v.cantidad}</span>
        <span class="sale-metodo">${v.metodo}</span>
        <span class="sale-amount">$${v.total}</span>
      </div>`).join('')
    : '<div class="empty">Sin ventas registradas hoy</div>';
}

// ── VENDER ────────────────────────────────────────────────────────
function renderVender() {
  document.getElementById('v-prod').innerHTML = prodOpts(false);
  document.getElementById('venta-ok').style.display = 'none';
  calcPreview();
}

function calcPreview() {
  const pid = parseInt(document.getElementById('v-prod').value);
  const qty = parseInt(document.getElementById('v-qty').value)||1;
  const prod = productos.find(p=>p.id===pid);
  if (!prod) return;
  document.getElementById('prev-precio').textContent = `$${prod.p}`;
  document.getElementById('prev-qty').textContent = qty;
  document.getElementById('prev-total').textContent = `$${prod.p * qty}`;
}

function registrarVenta() {
  const pid = parseInt(document.getElementById('v-prod').value);
  const qty = parseInt(document.getElementById('v-qty').value)||1;
  const metodo = document.getElementById('v-pago').value;
  const prod = productos.find(p=>p.id===pid);
  if (!prod) return;
  if (prod.s < qty) { toast('Stock insuficiente — solo hay ' + prod.s + ' unidades'); return; }

  prod.s -= qty;
  const venta = {
    id: Date.now(),
    productoId: pid,
    nombre: prod.n,
    categoria: prod.cat,
    cantidad: qty,
    precioUnit: prod.p,
    total: prod.p * qty,
    metodo: metodo,
    hora: nowTime(),
    fecha: today()
  };
  ventas.push(venta);
  saveData();

  document.getElementById('venta-ok').style.display = 'block';
  document.getElementById('venta-ok-desc').textContent =
    `${prod.n} ×${qty} — $${venta.total} vía ${metodo}`;

  document.getElementById('v-qty').value = 1;
  renderVender();
  toast('Venta registrada');
}

// ── INVENTARIO ────────────────────────────────────────────────────
function renderInventario() {
  document.getElementById('lista-inv').innerHTML = productos.map(p=>`
    <div class="prod-row">
      <span class="prod-cat ${CAT_CLASS[p.cat]}">${CAT_LABEL[p.cat]}</span>
      <span class="prod-name">${p.n}</span>
      ${p.s===0
        ? '<span class="badge-out">agotado</span>'
        : `<span class="prod-stock ${sClass(p)}">${p.s}</span>`}
      <span class="prod-price">$${p.p}</span>
    </div>`).join('');

  document.getElementById('r-prod').innerHTML = prodOpts(true);
}

function reponer() {
  const pid = parseInt(document.getElementById('r-prod').value);
  const qty = parseInt(document.getElementById('r-qty').value)||0;
  const prod = productos.find(p=>p.id===pid);
  if (prod && qty>0) {
    prod.s += qty;
    saveData();
    renderInventario();
    toast(`+${qty} unidades agregadas a ${prod.n}`);
  }
}

// ── HISTORIAL ─────────────────────────────────────────────────────
function renderHistorial() {
  const vh = ventasHoy();
  const total = vh.reduce((a,v)=>a+v.total,0);
  const efectivo = vh.filter(v=>v.metodo==='Efectivo $').reduce((a,v)=>a+v.total,0);
  const zelle = vh.filter(v=>v.metodo==='Zelle').reduce((a,v)=>a+v.total,0);
  const movil = vh.filter(v=>v.metodo==='Pago móvil').reduce((a,v)=>a+v.total,0);

  document.getElementById('m-historial').innerHTML = `
    <div class="metric"><div class="metric-label">Total hoy</div><div class="metric-value green">$${total}</div></div>
    <div class="metric"><div class="metric-label">Efectivo</div><div class="metric-value">$${efectivo}</div></div>
    <div class="metric"><div class="metric-label">Zelle</div><div class="metric-value blue">$${zelle}</div></div>
    <div class="metric"><div class="metric-label">Transacciones</div><div class="metric-value">${vh.length}</div></div>
  `;

  document.getElementById('lista-historial').innerHTML = vh.length
    ? [...vh].reverse().map(v=>`
      <div class="sale-row">
        <span class="sale-time">${v.hora}</span>
        <span class="sale-prod">${v.nombre} ×${v.cantidad}</span>
        <span class="sale-metodo">${v.metodo}</span>
        <span class="sale-amount">$${v.total}</span>
      </div>`).join('')
    : '<div class="empty">Sin ventas hoy</div>';
}

// ── REPORTES ──────────────────────────────────────────────────────
function renderReportes() {
  const total = ventas.reduce((a,v)=>a+v.total,0);
  const unidades = ventas.reduce((a,v)=>a+v.cantidad,0);
  const ticket = ventas.length ? Math.round(total/ventas.length) : 0;
  const dias = [...new Set(ventas.map(v=>v.fecha))].length || 1;

  document.getElementById('m-reportes').innerHTML = `
    <div class="metric"><div class="metric-label">Total acumulado</div><div class="metric-value green">$${total}</div></div>
    <div class="metric"><div class="metric-label">Unidades vendidas</div><div class="metric-value">${unidades}</div></div>
    <div class="metric"><div class="metric-label">Ticket promedio</div><div class="metric-value blue">$${ticket}</div></div>
    <div class="metric"><div class="metric-label">Días con ventas</div><div class="metric-value">${dias}</div></div>
  `;

  // Top productos
  const porProd = {};
  ventas.forEach(v=>{ porProd[v.nombre]=(porProd[v.nombre]||0)+v.total; });
  const topP = Object.entries(porProd).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxP = topP[0]?topP[0][1]:1;
  document.getElementById('top-prods').innerHTML = topP.length
    ? topP.map(([n,t])=>`
      <div class="bar-row">
        <span class="bar-name">${n.length>16?n.slice(0,15)+'…':n}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(t/maxP*100)}%"></div></div>
        <span class="bar-val">$${t}</span>
      </div>`).join('')
    : '<div class="empty">Sin datos aún</div>';

  // Por método de pago
  const porM = {};
  ventas.forEach(v=>{ porM[v.metodo]=(porM[v.metodo]||0)+v.total; });
  const maxM = Math.max(...Object.values(porM),1);
  document.getElementById('por-pago').innerHTML = Object.entries(porM).length
    ? Object.entries(porM).sort((a,b)=>b[1]-a[1]).map(([m,t])=>`
      <div class="bar-row">
        <span class="bar-name">${m}</span>
        <div class="bar-track"><div class="bar-fill oliva" style="width:${Math.round(t/maxM*100)}%"></div></div>
        <span class="bar-val">$${t}</span>
      </div>`).join('')
    : '<div class="empty">Sin datos aún</div>';

  // Por categoría
  const porCat = {};
  ventas.forEach(v=>{ porCat[v.categoria]=(porCat[v.categoria]||0)+v.total; });
  const maxC = Math.max(...Object.values(porCat),1);
  document.getElementById('por-cat').innerHTML = Object.entries(porCat).length
    ? Object.entries(porCat).sort((a,b)=>b[1]-a[1]).map(([c,t])=>`
      <div class="bar-row">
        <span class="bar-name">${CAT_LABEL[c]||c}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(t/maxC*100)}%; background: var(--dorado);"></div></div>
        <span class="bar-val">$${t}</span>
      </div>`).join('')
    : '<div class="empty">Sin datos aún</div>';
}

// ── EXPORT CSV ────────────────────────────────────────────────────
function exportarCSV() {
  if (!ventas.length) { toast('No hay ventas para exportar'); return; }
  const headers = 'Fecha,Hora,Producto,Categoria,Cantidad,PrecioUnit,Total,Metodo';
  const rows = ventas.map(v =>
    `${v.fecha},${v.hora},"${v.nombre}",${v.categoria},${v.cantidad},${v.precioUnit},${v.total},${v.metodo}`
  );
  const csv = [headers,...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ladispensa_ventas_${today().replace(/\//g,'-')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('CSV descargado');
}

// ── CLOCK ─────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const fecha = now.toLocaleDateString('es-VE',{weekday:'short',day:'numeric',month:'short'});
  const hora = now.toLocaleTimeString('es-VE',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('header-time').innerHTML = fecha+'<br>'+hora;
}

// ── INIT ──────────────────────────────────────────────────────────
renderDashboard();
updateClock();
setInterval(updateClock, 30000);
</script>
